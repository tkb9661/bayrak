<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömer KARTAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #E30A17;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        svg {
            width: 80vw;
            max-height: 90vh;
        }

        .crescent-star-group {
            transform: translate(0px, 0px);
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .crescent-star-group {
                transform: translate(131px, 0px);
            }
        }

        .contact-wrapper {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .contact-btn {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .contact-btn:hover {
            transform: scale(1.05);
        }

        .contact-btn svg {
            width: 22px;
            height: 22px;
        }

        .contact-box {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            width: 260px;
            margin-bottom: 10px;
        }

        .contact-box.active {
            display: block;
        }

        .contact-box input, 
        .contact-box textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            outline: none;
            resize: none;
        }

        .contact-box input:focus, 
        .contact-box textarea:focus {
            border-color: #E30A17;
        }

        .contact-box button {
            width: 100%;
            padding: 8px;
            background-color: #E30A17;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .contact-box button:hover {
            background-color: #b50812;
        }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <div class="container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
            <rect width="1200" height="800" fill="#e30a17"/>
            <g class="crescent-star-group">
                <circle cx="400" cy="400" r="200" fill="#fff"/>
                <circle cx="450" cy="400" r="160" fill="#e30a17"/>
                <g transform="translate(669, 400) rotate(270)">
                    <polygon points="0,-100 22.45,-30.9 95.11,-30.9 36.33,11.8 58.78,90.9 0,49.1 -58.78,90.9 -36.33,11.8 -95.11,-30.9 -22.45,-30.9" fill="#fff"/>
                </g>
            </g>
        </svg>
    </div>

    <div class="contact-wrapper">
        <div class="contact-box" id="contactBox">
            <form id="contactForm">
                <input type="text" id="subject" placeholder="Konu" required>
                <textarea id="message" rows="3" placeholder="Mesajınız..." required></textarea>
                <button type="submit" id="submitBtn">Gönder</button>
            </form>
        </div>

        <div class="contact-btn" onclick="toggleForm()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#E30A17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </div>
    </div>

    <script>
        const EMAILJS_PUBLIC_KEY = "mCNlo1zP_28gFbd9E";
        const EMAILJS_SERVICE_ID = "service_ysxa28i";
        const EMAILJS_TEMPLATE_ID = "template_zikixdk";
        
        emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

        function toggleForm() {
            const box = document.getElementById('contactBox');
            box.classList.toggle('active');
        }

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Gönderiliyor...";
            btn.disabled = true;

            const templateParams = {
                user_subject: document.getElementById('subject').value,
                user_message: document.getElementById('message').value
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                .then(function() {
                    btn.innerText = "İletildi!";
                    setTimeout(() => {
                        document.getElementById('contactForm').reset();
                        btn.innerText = "Gönder";
                        btn.disabled = false;
                        toggleForm();
                    }, 2000);
                }, function(error) {
                    alert("Bir hata oluştu, lütfen tekrar deneyin.");
                    btn.innerText = "Gönder";
                    btn.disabled = false;
                });
        });
    </script>

</body>
</html>

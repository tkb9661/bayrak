<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoş Geldiniz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #E30A17; /* Bayrak Kırmızısı */
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        svg {
            width: 80vw; /* Ekran genişliğinin %80'i */
            max-height: 90vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Vektörel (Yüksek Kaliteli) Türk Bayrağı -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
            <rect width="1200" height="800" fill="#e30a17"/>
            <circle cx="400" cy="400" r="200" fill="#fff"/>
            <circle cx="450" cy="400" r="160" fill="#e30a17"/>
            <polygon points="575,400 516.31,419.06 538.73,350.14 480.04,331.08 541.23,331.08 563.65,262.16 586.07,331.08 647.26,331.08 588.57,350.14 610.99,419.06" fill="#fff"/>
        </svg>
    </div>
</body>
</html>
